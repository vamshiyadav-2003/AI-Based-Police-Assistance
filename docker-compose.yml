services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    # NOTE: This does NOT spin up its own PostgreSQL container, since you
    # already have your own database. DATABASE_URL in backend/.env should
    # point at your existing PostgreSQL instance.
    #
    # If your database runs on your host machine (not in Docker) and you're
    # on Linux, use 172.17.0.1 instead of localhost in DATABASE_URL, or run
    # the container with network_mode: host, e.g.:
    # network_mode: "host"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
