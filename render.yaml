services:
  # FastAPI Python Backend
  - type: web
    name: gvak-police-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gvak-police-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false

  # React Vite Frontend (Static Site)
  - type: web
    name: gvak-police-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        fromPath: /*
        toPath: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: gvak-police-backend
          type: web
          property: url

databases:
  - name: gvak-police-db
    plan: free
